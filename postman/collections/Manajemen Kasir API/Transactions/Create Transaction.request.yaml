$kind: http-request
url: "{{base_url}}/api/transactions"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
  X-XSRF-TOKEN: "{{csrf_token}}"
body:
  type: text
  content: |-
    {
        "cart": [
            {
                "id": 1,
                "qty": 2,
                "price": 18000
            }
        ],
        "grand_total": 36000,
        "payment_amount": 50000,
        "payment_method": "cash"
    }
order: 2000
